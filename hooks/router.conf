# Auto model router backend
# Options: heuristic | ollama | deepseek | groq
#
# Switch example:
#   echo "CLAUDE_ROUTER_BACKEND=deepseek" > ~/.claude/router.conf
#
CLAUDE_ROUTER_BACKEND=heuristic

# Ollama model (only used when BACKEND=ollama)
CLAUDE_ROUTER_OLLAMA_MODEL=qwen2.5:0.5b

# Timeout in seconds
CLAUDE_ROUTER_TIMEOUT=5
